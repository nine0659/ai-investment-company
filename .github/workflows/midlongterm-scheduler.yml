name: Mid/Long Term Investment Analysis

# KST = UTC+9
# 중기: 매주 일요일 20:00 KST = 11:00 UTC Sunday  → cron: '0 11 * * 0'
# 장기: 매월 첫째 일요일 20:30 KST = 11:30 UTC    → cron: '30 11 * * 0' + day <= 7 조건
#
# ※ 주 실행자는 Render 스케줄러(scheduler.py, 일 20:05/20:30). 이 워크플로는
#   Render 다운 시 백업이다. GH cron은 수십 분 지연되므로 정상일 때는 늦게
#   실행되며, 에이전트 내부 claim_report_slot 가드가 중복 발송을 차단한다.
#   (2026-07-05 장기분석 2회 발송 원인 — 양쪽 모두 가드 없이 실행)

on:
  # 2026-07-06 축소: 장기분석 cron 제거 (일시 중단, 수동 실행만 가능).
  # 중기 cron은 Render 통합 브리핑(일 20:00)의 백업으로만 유지.
  schedule:
    - cron: '0 11 * * 0'    # 매주 일요일 20:00 KST — 중기 분석 백업

  workflow_dispatch:
    inputs:
      analysis_type:
        description: '분석 타입'
        required: true
        default: 'midterm'
        type: choice
        options:
          - midterm
          - longterm

permissions:
  contents: read

# ── 중기 분석 (매주 일요일) ───────────────────────────────────────
jobs:
  midterm:
    name: 중기 분석 (1~6개월)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.analysis_type == 'midterm')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run midterm analysis
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:        ${{ secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CD: ${{ secrets.KIS_ACCOUNT_PROD_CD }}
          DART_API_KEY:        ${{ secrets.DART_API_KEY }}
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          PYTHONUTF8: "1"
        run: python main.py --type midterm

# ── 장기 분석 (매월 첫째 일요일) ─────────────────────────────────
  longterm:
    name: 장기 분석 (1년+)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # 일시 중단 (2026-07-06) — 수동 실행만 가능
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.analysis_type == 'longterm')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 매월 첫째 일요일(1~7일)만 실행. workflow_dispatch는 항상 통과
      - name: Check first Sunday of month
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          elif [ "$(date +%d)" -le 7 ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
            echo "첫째 주 일요일이 아니므로 장기 분석을 건너뜁니다."
          fi

      - name: Run longterm analysis
        if: steps.check.outputs.proceed == 'true'
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:        ${{ secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CD: ${{ secrets.KIS_ACCOUNT_PROD_CD }}
          DART_API_KEY:        ${{ secrets.DART_API_KEY }}
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          PYTHONUTF8: "1"
        run: python main.py --type longterm
