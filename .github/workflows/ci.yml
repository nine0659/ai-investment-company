name: CI — Tests

# 모든 push·PR에서 회귀 테스트 실행.
# 테스트가 깨진 코드는 배포(Render 자동배포·GH Actions 잡)에 태우지 않는 것이 원칙 —
# 지금까지 반복된 브리핑 사고(중복 발송, 성장률 왜곡, 배당 291%, 알파 -71%)는
# 전부 테스트 없이 배포된 계산 로직에서 나왔다.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: pytest tests/ -v --tb=short
