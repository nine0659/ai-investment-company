name: AI Investment Research Scheduler

# KST = UTC+9 이므로 9시간을 빼서 UTC 기준으로 등록
# 08:20 KST (Mon-Fri)  = 23:20 UTC (Sun-Thu)
# 10:00 KST (Mon-Fri)  = 01:00 UTC (Mon-Fri)
# 13:00 KST (Mon-Fri)  = 04:00 UTC (Mon-Fri)
# 15:50 KST (Mon-Fri)  = 06:50 UTC (Mon-Fri)
# 18:00 KST (Sun)      = 09:00 UTC (Sun)   ← KOSPI 주간 추세 분석
# 20:00 KST (Sun)      = 11:00 UTC (Sun)   ← 주간 적중률 리포트
# 20:30 KST (Sun)      = 11:30 UTC (Sun)   ← 미국 주식 추천
# 21:00 KST (1st Mon)  = 12:00 UTC (Mon)   ← 월간 학습 (매월 1일 UTC)
#
# ※ 일간 브리핑 트리거: cron-job.org → repository_dispatch 전담 (GitHub schedule 백업 제거 — 수 시간 지연으로 저녁 오발송 문제)
# ※ 주간·월간 트리거: GitHub Actions schedule (cron-job.org 미설정)
#
# DART 공시 알림은 별도 job을 제거하고 장전·장중·장마감 브리핑에 통합됩니다.
# cron-job.org에서 호출할 event_type 목록:
#   pre_market, intra1, intra2, close_market
#   price_alert, weekly_stats, monthly_learning, us_invest, trend_analysis

on:
  # ── 1순위: cron-job.org에서 GitHub API로 호출 ─────────────────
  repository_dispatch:
    types:
      - pre_market
      - intra1
      - intra2
      - close_market
      - price_alert
      - weekly_stats
      - monthly_learning
      - us_invest
      - trend_analysis

    # ── 2순위: GitHub 자체 스케줄 (백업, 주간·월간만 — 일간 브리핑은 cron-job.org 전담) ──
  schedule:
    - cron: '0 9 * * 0'
    - cron: '0 11 * * 0'
    - cron: '30 11 * * 0'
    - cron: '0 12 1 * *'

  # ── 수동 실행 ──────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      run_type:
        description: '실행 타입'
        required: true
        default: 'pre'
        type: choice
        options:
          - pre
          - intra1
          - intra2
          - close
          - price-alert
          - weekly
          - trend
          - monthly
          - us-invest

permissions:
  contents: read

jobs:
  # ── 일간 브리핑 (pre/intra1/intra2/close) ────────────────────
  briefing:
    name: Investment Briefing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 동일 run_type의 동시 실행 방지 — 중복 발송 차단 (DB 체크와 이중 보호)
    concurrency:
      group: briefing-${{ github.event.action || github.event.schedule || inputs.run_type || 'manual' }}
      cancel-in-progress: false
    if: >-
      (github.event_name == 'workflow_dispatch' && (inputs.run_type == 'pre' || inputs.run_type == 'intra1' || inputs.run_type == 'intra2' || inputs.run_type == 'close')) ||
      (github.event_name == 'repository_dispatch' && (github.event.action == 'pre_market' || github.event.action == 'intra1' || github.event.action == 'intra2' || github.event.action == 'close_market'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run type
        id: run_type
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.run_type }}" >> $GITHUB_OUTPUT
          elif [ "$EVENT" = "repository_dispatch" ]; then
            case "${{ github.event.action }}" in
              pre_market)   echo "type=pre"    >> $GITHUB_OUTPUT ;;
              intra1)       echo "type=intra1" >> $GITHUB_OUTPUT ;;
              intra2)       echo "type=intra2" >> $GITHUB_OUTPUT ;;
              close_market) echo "type=close"  >> $GITHUB_OUTPUT ;;
              *)            echo "type=pre"    >> $GITHUB_OUTPUT ;;
            esac
          else
            case "${{ github.event.schedule }}" in
              "20 23 * * 0-4") echo "type=pre"    >> $GITHUB_OUTPUT ;;
              "0 1 * * 1-5")   echo "type=intra1" >> $GITHUB_OUTPUT ;;
              "0 4 * * 1-5")   echo "type=intra2" >> $GITHUB_OUTPUT ;;
              *)                echo "type=close"  >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run briefing — ${{ steps.run_type.outputs.type }}
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:        ${{ secrets.OPENAI_MODEL }}
          OPENAI_MODEL_CEO:    ${{ secrets.OPENAI_MODEL_CEO }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CD: ${{ secrets.KIS_ACCOUNT_PROD_CD }}
          DART_API_KEY:        ${{ secrets.DART_API_KEY }}
          PYTHONUTF8:          "1"
        run: python main.py --type ${{ steps.run_type.outputs.type }}

  # ── 가격 알림 ─────────────────────────────────────────────────
  price-alert:
    name: Price Alert
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'price_alert') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_type == 'price-alert')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run price alert
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:     ${{ secrets.KIS_ACCOUNT_NO }}
          PYTHONUTF8:         "1"
        run: python main.py --type price-alert

  # ── KOSPI 주간 추세 분석 (일요일 18:00 KST) ─────────────────
  trend-analysis:
    name: KOSPI Weekly Trend Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'trend_analysis') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 9 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_type == 'trend')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run KOSPI trend analysis
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:       ${{ secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUTF8:         "1"
        run: python main.py --type trend

  # ── 주간 적중률 리포트 (일요일 20:00 KST) ────────────────────
  weekly-stats:
    name: Weekly Stats Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'weekly_stats') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_type == 'weekly')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run weekly stats
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:       ${{ secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUTF8:         "1"
        run: python main.py --type weekly

  # ── 미국 주식 주간 추천 (일요일 20:30 KST) ───────────────────
  us-invest:
    name: US Investment Picks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'us_invest') ||
      (github.event_name == 'schedule' && github.event.schedule == '30 11 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_type == 'us-invest')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run US invest picks
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_CEO:   ${{ secrets.OPENAI_MODEL_CEO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUTF8:         "1"
        run: python main.py --type us-invest

  # ── 월간 자기학습 (매월 1일 21:00 KST) ──────────────────────
  monthly-learning:
    name: Monthly Self-Learning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      (github.event_name == 'repository_dispatch' && github.event.action == 'monthly_learning') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 12 1 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_type == 'monthly')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run monthly learning
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL:       ${{ secrets.OPENAI_MODEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUTF8:         "1"
        run: python main.py --type monthly
