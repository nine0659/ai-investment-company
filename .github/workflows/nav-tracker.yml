name: NAV & Tracker Backup

# Render 스케줄러(16:10 NAV / 16:20 성과추적)의 백업.
# 16:45 KST = 07:45 UTC (Mon-Fri) 1회 — GH cron은 수십 분 지연될 수 있으나
# 장마감 후 데이터라 무방하다. scripts/backup_daily_jobs.py가 오늘 실행 흔적
# (job_runs)을 확인해 Render가 정상이면 스킵하므로 중복 실행이 없다.
#
# ⚠️ 2026-07-09 재작성: 기존 파일은 YAML 문법 오류(run 블록 들여쓰기)로
# 생성일부터 한 번도 실행되지 못했다 (2026-07-08 daily_tracker 누락 사고).

on:
  schedule:
    - cron: '45 7 * * 1-5'   # 16:45 KST — Render 누락분 백업
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    name: NAV·성과추적 백업 (16:45 KST)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run backup daily jobs (skip if Render already ran)
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KIS_APP_KEY:         ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:      ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:      ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_ACCOUNT_PROD_CD: ${{ secrets.KIS_ACCOUNT_PROD_CD }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL:        ${{ secrets.DATABASE_URL }}
          PYTHONUTF8:          "1"
        run: python scripts/backup_daily_jobs.py
