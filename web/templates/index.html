<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 투자 어시스턴트</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .prose-chat { line-height: 1.65; }
    .prose-chat h1,.prose-chat h2,.prose-chat h3 { font-weight:700; margin:0.75em 0 0.4em; color:#e2e8f0; }
    .prose-chat h1 { font-size:1.2em; border-bottom:1px solid #334155; padding-bottom:0.3em; }
    .prose-chat h2 { font-size:1.05em; }
    .prose-chat p  { margin:0.5em 0; }
    .prose-chat ul,.prose-chat ol { margin:0.4em 0 0.4em 1.2em; }
    .prose-chat li { margin:0.2em 0; }
    .prose-chat strong { color:#93c5fd; font-weight:600; }
    .prose-chat code { background:#1e3a5f; padding:0.1em 0.35em; border-radius:3px; font-size:0.88em; color:#7dd3fc; }
    .prose-chat pre  { background:#0f172a; padding:0.75em 1em; border-radius:6px; overflow-x:auto; margin:0.5em 0; }
    .prose-chat blockquote { border-left:3px solid #3b82f6; padding-left:0.75em; color:#94a3b8; margin:0.5em 0; }
    .prose-chat hr  { border-color:#334155; margin:0.8em 0; }
    .scrollbar-thin::-webkit-scrollbar { width:4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background:transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor-blink { animation:blink 1s infinite; }
    .tab-active { background:#1e40af; color:#fff; }
    .tab-inactive { color:#94a3b8; }
    .tab-inactive:hover { background:#1e293b; color:#e2e8f0; }
    .stat-card { @apply bg-slate-800 rounded-xl p-4; }
    .alert-entry  { border-left: 3px solid #22c55e; }
    .alert-stop   { border-left: 3px solid #ef4444; }
    .alert-target { border-left: 3px solid #f59e0b; }
    .alert-volume { border-left: 3px solid #8b5cf6; }
    .alert-golden_cross { border-left: 3px solid #06b6d4; }
    .progress-bar { height:6px; border-radius:3px; background:#1e293b; overflow:hidden; }
    .progress-fill { height:100%; border-radius:3px; transition:width 0.5s; }
  </style>
</head>
<body class="h-full bg-slate-900 text-slate-100 font-sans"
  x-data="app()" x-init="init()" x-cloak>

<!-- ── LAYOUT ──────────────────────────────────────────────── -->
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar (desktop) -->
  <aside class="hidden md:flex flex-col w-56 bg-slate-800 border-r border-slate-700 flex-shrink-0">
    <div class="px-4 py-4 border-b border-slate-700">
      <div class="text-blue-400 font-bold text-sm">🤖 AI 투자 어시스턴트</div>
      <div class="text-slate-400 text-xs mt-0.5" x-text="clock"></div>
    </div>
    <div class="px-4 py-2 border-b border-slate-700">
      <span class="text-xs px-2 py-0.5 rounded-full"
        :class="marketOpen ? 'bg-green-900 text-green-300' : 'bg-slate-700 text-slate-400'"
        x-text="marketOpen ? '● 장 운영중' : '● 장 마감'"></span>
    </div>
    <nav class="flex-1 px-2 py-3 space-y-0.5 overflow-y-auto">
      <template x-for="t in tabs" :key="t.id">
        <button @click="tab=t.id" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition"
          :class="tab===t.id ? 'tab-active' : 'tab-inactive'">
          <span x-text="t.icon"></span>
          <span x-text="t.label"></span>
        </button>
      </template>
    </nav>
    <!-- Portfolio quick stats -->
    <div class="px-4 py-3 border-t border-slate-700 text-xs space-y-1" x-show="portfolioSummary">
      <div class="text-slate-400">포트폴리오</div>
      <div class="text-slate-200" x-text="portfolioSummary?.total_current ? portfolioSummary.total_current.toLocaleString()+'원' : '-'"></div>
      <div :class="(portfolioSummary?.total_pnl_pct||0) >= 0 ? 'text-green-400' : 'text-red-400'"
           x-text="portfolioSummary?.total_pnl_pct != null ? ((portfolioSummary.total_pnl_pct>=0?'+':'')+portfolioSummary.total_pnl_pct.toFixed(2)+'%') : ''"></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex flex-col flex-1 min-w-0">

    <!-- Mobile header -->
    <header class="md:hidden flex items-center justify-between px-4 py-3 bg-slate-800 border-b border-slate-700">
      <span class="text-blue-400 font-bold text-sm">🤖 AI 투자 어시스턴트</span>
      <div class="flex items-center gap-3">
        <span class="text-xs" :class="marketOpen ? 'text-green-400' : 'text-slate-400'"
              x-text="marketOpen ? '● 장중' : '● 마감'"></span>
        <span class="text-slate-400 text-xs" x-text="clock"></span>
      </div>
    </header>

    <main class="flex-1 overflow-hidden">

      <!-- ── 🏠 대시보드 ────────────────────────────────────── -->
      <div class="h-full overflow-y-auto scrollbar-thin p-4 md:p-6" x-show="tab==='dashboard'">
        <div class="max-w-5xl mx-auto space-y-5">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-bold">대시보드</h2>
            <button @click="loadDashboard()" class="text-xs text-blue-400 hover:text-blue-300">새로고침</button>
          </div>

          <!-- 포트폴리오 요약 카드 -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-400 mb-1">총 평가금액</div>
              <div class="font-bold text-sm" x-text="portfolioSummary?.total_current ? portfolioSummary.total_current.toLocaleString()+'원' : '-'"></div>
            </div>
            <div class="bg-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-400 mb-1">총 손익</div>
              <div class="font-bold text-sm"
                :class="(portfolioSummary?.total_pnl_amt||0)>=0?'text-green-400':'text-red-400'"
                x-text="portfolioSummary?.total_pnl_amt != null ? ((portfolioSummary.total_pnl_amt>=0?'+':'')+portfolioSummary.total_pnl_amt.toLocaleString()+'원') : '-'"></div>
            </div>
            <div class="bg-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-400 mb-1">수익률</div>
              <div class="font-bold text-sm"
                :class="(portfolioSummary?.total_pnl_pct||0)>=0?'text-green-400':'text-red-400'"
                x-text="portfolioSummary?.total_pnl_pct != null ? ((portfolioSummary.total_pnl_pct>=0?'+':'')+portfolioSummary.total_pnl_pct.toFixed(2)+'%') : '-'"></div>
            </div>
            <div class="bg-slate-800 rounded-xl p-4">
              <div class="text-xs text-slate-400 mb-1">보유 종목수</div>
              <div class="font-bold text-sm" x-text="(portfolioSummary?.count||0)+'종목'"></div>
            </div>
          </div>

          <!-- 2열: 최근 알림 + 최근 브리핑 -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- 최근 알림 -->
            <div class="bg-slate-800 rounded-xl p-4">
              <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-semibold">최근 알림</span>
                <button @click="tab='watchlist'" class="text-xs text-blue-400">더보기</button>
              </div>
              <template x-if="dashAlerts.length === 0">
                <div class="text-xs text-slate-500 py-4 text-center">최근 알림 없음</div>
              </template>
              <div class="space-y-2">
                <template x-for="a in dashAlerts.slice(0,5)" :key="a.id">
                  <div class="px-3 py-2 rounded-lg bg-slate-700/50 text-xs border-l-2"
                    :class="'alert-'+a.alert_type">
                    <div class="flex items-center gap-2 mb-0.5">
                      <span x-text="{'entry':'✅진입신호','stop':'🚨손절','target':'🎯목표가','volume':'📈거래량','golden_cross':'⚡크로스'}[a.alert_type]||a.alert_type"></span>
                      <span class="text-slate-300 font-medium" x-text="a.name||a.code"></span>
                    </div>
                    <div class="text-slate-400" x-text="a.created_at?.slice(11,16)||''"></div>
                  </div>
                </template>
              </div>
            </div>

            <!-- 최근 브리핑 -->
            <div class="bg-slate-800 rounded-xl p-4">
              <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-semibold">최근 브리핑</span>
                <button @click="tab='briefing'" class="text-xs text-blue-400">더보기</button>
              </div>
              <template x-if="!dashLatestBriefing">
                <div class="text-xs text-slate-500 py-4 text-center">저장된 브리핑 없음</div>
              </template>
              <template x-if="dashLatestBriefing">
                <div>
                  <div class="flex items-center gap-2 mb-2">
                    <span class="text-xs font-medium text-slate-300" x-text="dashLatestBriefing.date"></span>
                    <span class="text-xs px-2 py-0.5 rounded-full bg-blue-900 text-blue-300"
                      x-text="{'pre_market':'장전','intra_market_1':'장중1','intra_market_2':'장중2','close_market':'장마감'}[dashLatestBriefing.run_type]||dashLatestBriefing.run_type"></span>
                  </div>
                  <div class="text-xs text-slate-400 leading-relaxed" x-text="(dashLatestBriefing.preview||'').slice(0,200)+'...'"></div>
                </div>
              </template>
            </div>
          </div>

          <!-- 워치리스트 현황 -->
          <div class="bg-slate-800 rounded-xl p-4">
            <div class="flex items-center justify-between mb-3">
              <span class="text-sm font-semibold">관심종목 현황</span>
              <button @click="tab='watchlist'" class="text-xs text-blue-400">관리</button>
            </div>
            <template x-if="!dashWatchlist || dashWatchlist.length===0">
              <div class="text-xs text-slate-500 py-3 text-center">관심종목 없음</div>
            </template>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
              <template x-for="w in (dashWatchlist||[]).slice(0,6)" :key="w.code">
                <div class="bg-slate-700/50 rounded-lg px-3 py-2 flex items-center justify-between cursor-pointer hover:bg-slate-700 transition"
                  @click="quickResearch(w.code)">
                  <div>
                    <div class="text-xs font-medium" x-text="w.name"></div>
                    <div class="text-xs text-slate-400" x-text="w.code"></div>
                  </div>
                  <div class="text-right" x-show="w.current_price">
                    <div class="text-xs font-semibold" x-text="(w.current_price||0).toLocaleString()+'원'"></div>
                    <div class="text-xs" :class="(w.change_pct||0)>=0?'text-green-400':'text-red-400'"
                      x-text="(w.change_pct>=0?'+':'')+(w.change_pct||0).toFixed(2)+'%'"></div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>

      <!-- ── 💬 채팅 ───────────────────────────────────────── -->
      <div class="h-full flex flex-col" x-show="tab==='chat'">
        <div class="flex-1 overflow-y-auto scrollbar-thin p-4 space-y-4" id="chatMessages">
          <template x-if="messages.length === 0">
            <div class="text-center py-16 text-slate-400">
              <div class="text-5xl mb-4">🤖</div>
              <div class="text-lg font-semibold text-slate-300 mb-2">AI 투자 어시스턴트</div>
              <div class="text-sm space-y-1">
                <div>"삼성전자 지금 살 만한가요?"</div>
                <div>"오늘 반도체 섹터 전망은?"</div>
                <div>"FOMC 금리 결정이 한국 주식에 미치는 영향"</div>
              </div>
              <div class="mt-4 text-xs text-slate-500">기업 심층 분석은 <strong class="text-blue-400">리서치</strong> 탭을 이용하세요</div>
            </div>
          </template>
          <template x-for="(msg, i) in messages" :key="i">
            <div class="flex" :class="msg.role==='user' ? 'justify-end' : 'justify-start'">
              <div class="max-w-[85%] md:max-w-[75%]">
                <template x-if="msg.role==='user'">
                  <div class="bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm" x-text="msg.content"></div>
                </template>
                <template x-if="msg.role==='assistant'">
                  <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-4 py-3 text-sm">
                    <div class="prose-chat" x-html="renderMarkdown(msg.content)"></div>
                    <span x-show="msg.streaming" class="cursor-blink text-blue-400 ml-0.5">▍</span>
                  </div>
                </template>
              </div>
            </div>
          </template>
          <template x-if="chatLoading && messages[messages.length-1]?.role !== 'assistant'">
            <div class="flex justify-start">
              <div class="bg-slate-800 rounded-2xl rounded-tl-sm px-4 py-3">
                <div class="flex gap-1.5">
                  <span class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay:0s"></span>
                  <span class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay:.15s"></span>
                  <span class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay:.3s"></span>
                </div>
              </div>
            </div>
          </template>
        </div>
        <div class="border-t border-slate-700 p-4">
          <div class="flex gap-2">
            <input x-model="chatInput" @keydown.enter.prevent="sendChat()"
              class="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 placeholder-slate-500"
              placeholder="투자 질문을 입력하세요..." :disabled="chatLoading">
            <button @click="sendChat()" :disabled="chatLoading || !chatInput.trim()"
              class="px-4 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 rounded-xl text-sm font-medium transition">전송</button>
          </div>
          <div class="text-xs text-slate-500 mt-1.5 px-1">Enter로 전송 · 기업 심층 분석은 리서치 탭 이용</div>
        </div>
      </div>

      <!-- ── 📊 포트폴리오 ─────────────────────────────────── -->
      <div class="h-full overflow-y-auto scrollbar-thin p-4 md:p-6" x-show="tab==='portfolio'">
        <div class="max-w-5xl mx-auto space-y-5">
          <div class="flex items-center justify-between flex-wrap gap-2">
            <h2 class="text-lg font-bold">포트폴리오</h2>
            <div class="flex gap-2 flex-wrap">
              <button @click="portfolioSubTab='positions'" class="text-xs px-3 py-1.5 rounded-lg transition"
                :class="portfolioSubTab==='positions' ? 'bg-blue-700 text-white' : 'bg-slate-700 text-slate-300'">보유종목</button>
              <button @click="portfolioSubTab='history'; loadHistory()" class="text-xs px-3 py-1.5 rounded-lg transition"
                :class="portfolioSubTab==='history' ? 'bg-blue-700 text-white' : 'bg-slate-700 text-slate-300'">매매이력</button>
              <button @click="showAddPosition=true" class="text-xs px-3 py-1.5 bg-green-700 hover:bg-green-600 rounded-lg transition text-white">+ 종목 추가</button>
              <button @click="loadPortfolio()" class="text-xs text-blue-400 hover:text-blue-300">새로고침</button>
            </div>
          </div>

          <!-- 종목 추가 모달 -->
          <div x-show="showAddPosition" class="bg-slate-800 rounded-xl p-4 border border-green-800">
            <div class="text-sm font-semibold mb-3 text-green-300">보유 종목 추가 / 추가매수</div>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-3">
              <div>
                <label class="text-xs text-slate-400 mb-1 block">종목코드 *</label>
                <input x-model="posForm.code" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="005930">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">종목명 *</label>
                <input x-model="posForm.name" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="삼성전자">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">수량(주) *</label>
                <input x-model.number="posForm.quantity" type="number" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="10">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">평균단가(원) *</label>
                <input x-model.number="posForm.avg_price" type="number" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="75000">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">목표가(원)</label>
                <input x-model.number="posForm.target_price" type="number" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="85000">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">손절가(원)</label>
                <input x-model.number="posForm.stop_price" type="number" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="70000">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">투자전략</label>
                <select x-model="posForm.timeframe" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                  <option value="short">단기 (1주~1개월)</option>
                  <option value="mid">중기 (1~6개월)</option>
                  <option value="long">장기 (6개월+)</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">섹터</label>
                <input x-model="posForm.sector" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="반도체">
              </div>
            </div>
            <div class="mb-3">
              <label class="text-xs text-slate-400 mb-1 block">투자 근거 (메모)</label>
              <input x-model="posForm.memo" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="HBM 수요 증가로 실적 턴어라운드 기대">
            </div>
            <div class="flex gap-2 justify-end">
              <button @click="showAddPosition=false; posForm={code:'',name:'',quantity:null,avg_price:null,target_price:null,stop_price:null,timeframe:'short',sector:'',memo:''}"
                class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition">취소</button>
              <button @click="addPosition()"
                class="text-xs px-4 py-2 bg-green-700 hover:bg-green-600 rounded-lg transition text-white">추가</button>
            </div>
          </div>

          <!-- 매도 모달 -->
          <div x-show="sellModal.show" class="bg-slate-800 rounded-xl p-4 border border-red-800">
            <div class="text-sm font-semibold mb-3 text-red-300" x-text="'매도: '+(sellModal.name||'')"></div>
            <div class="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label class="text-xs text-slate-400 mb-1 block">매도가(원) *</label>
                <input x-model.number="sellModal.exit_price" type="number" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" placeholder="80000">
              </div>
              <div>
                <label class="text-xs text-slate-400 mb-1 block">매도 수량 (미입력=전량)</label>
                <input x-model.number="sellModal.partial_qty" type="number" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" :placeholder="sellModal.qty+'주 (전량)'">
              </div>
            </div>
            <div class="flex gap-2 justify-end">
              <button @click="sellModal.show=false" class="text-xs px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition">취소</button>
              <button @click="closePosition()"
                class="text-xs px-4 py-2 bg-red-700 hover:bg-red-600 rounded-lg transition text-white">매도 확인</button>
            </div>
          </div>

          <!-- 목표가/손절가 수정 모달 -->
          <div x-show="editModal.show" class="bg-slate-800 rounded-xl p-4 border border-yellow-800">
            <div class="text-sm font-semibold mb-3 text-yellow-300" x-text="'수정: '+(editModal.name||'')"></div>

<script>
marked.setOptions({ breaks: true, gfm: true });

function app() {
  return {
    tab: 'dashboard',
    clock: '',
    marketOpen: false,
    tabs: [
      { id: 'dashboard', icon: '🏠', label: '대시보드' },
      { id: 'chat',      icon: '💬', label: '채팅' },
      { id: 'research',  icon: '🔍', label: '리서치' },
      { id: 'portfolio', icon: '📊', label: '포트폴리오' },
      { id: 'watchlist', icon: '📋', label: '워치리스트' },
      { id: 'briefing',  icon: '📰', label: '브리핑' },
      { id: 'backtest',  icon: '📈', label: '백테스트' },
    ],

    // Chat
    messages: [], chatInput: '', chatLoading: false,

    // Portfolio
    portfolio: null, balance: null, portfolioSummary: null, portfolioLoading: false,
    portfolioSubTab: 'positions',
    tradeHistory: [], historyLoading: false,
    showAddPosition: false,
    posForm: { code:'', name:'', quantity:null, avg_price:null, target_price:null, stop_price:null, timeframe:'short', sector:'', memo:'' },
    sellModal: { show:false, code:'', name:'', qty:0, exit_price:null, partial_qty:null },
    editModal: { show:false, code:'', name:'', target_price:null, stop_price:null, timeframe:'short', memo:'' },

    // Watchlist
    watchlist: null, watchlistLoading: false,
    watchlistAlerts: [],
    showAddWatchlist: false,
    wlForm: { code:'', name:'', target_entry: null, timeframe:'short', reason:'' },

    // Briefings
    briefings: null, briefingsLoading: false,

    // Research
    researchQuery: '', researchResult: '', researchStatus: '', researchLoading: false,
    searchResults: [], searchTimer: null,

    // Dashboard
    dashAlerts: [], dashWatchlist: null, dashLatestBriefing: null,

    // Backtest
    btSubTab: 'ai', btDays: 20, btLoading: false,
    btStats: null, btItems: [], btChartData: [],
    perfLoading: false, perfStats: null, perfTrades: [],

    // Chart instances
    _sectorChart: null, _tfChart: null, _btChart: null,

    init() {
      this.updateClock();
      setInterval(() => this.updateClock(), 1000);
      this.checkStatus();
      setInterval(() => this.checkStatus(), 60000);

      this.$watch('tab', (t) => {
        if (t === 'dashboard')  this.loadDashboard();
        if (t === 'portfolio' && this.portfolio === null) this.loadPortfolio();
        if (t === 'watchlist' && this.watchlist === null) this.loadWatchlist();
        if (t === 'briefing'  && this.briefings === null) this.loadBriefings();
        if (t === 'backtest'  && !this.btStats && !this.btLoading) this.loadBacktest();
      });

      this.$watch('researchQuery', (q) => {
        clearTimeout(this.searchTimer);
        if (q.length >= 2 && !q.match(/^\d/)) {
          this.searchTimer = setTimeout(() => this.searchCompanies(q), 400);
        } else {
          this.searchResults = [];
        }
      });

      // 초기 대시보드 로드
      this.loadDashboard();
    },

    updateClock() {
      this.clock = new Date().toLocaleTimeString('ko-KR', {
        timeZone: 'Asia/Seoul', hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    },

    async checkStatus() {
      try {
        const r = await fetch('/api/status');
        const d = await r.json();
        this.marketOpen = d.market === 'open';
      } catch {}
    },

    renderMarkdown(text) {
      if (!text) return '';
      try { return marked.parse(text); } catch { return text; }
    },

    // ── Dashboard ────────────────────────────────────────────
    async loadDashboard() {
      const [alertsR, watchR, briefR, sumR] = await Promise.allSettled([
        fetch('/api/alerts?days=7').then(r => r.json()),
        fetch('/api/watchlist').then(r => r.json()),
        fetch('/api/briefings?limit=1').then(r => r.json()),
        fetch('/api/portfolio/summary').then(r => r.json()),
      ]);
      this.dashAlerts   = alertsR.value?.alerts || [];
      this.dashWatchlist = watchR.value?.items || [];
      this.dashLatestBriefing = (briefR.value?.briefings || [])[0] || null;
      this.portfolioSummary   = sumR.value || null;
    },

    // ── Chat ─────────────────────────────────────────────────
    async sendChat() {
      const msg = this.chatInput.trim();
      if (!msg || this.chatLoading) return;
      this.chatInput = '';
      this.chatLoading = true;
      const history = this.messages.slice(-10).map(m => ({ role: m.role, content: m.content }));
      this.messages.push({ role: 'user', content: msg });
      this.messages.push({ role: 'assistant', content: '', streaming: true });
      const aiIdx = this.messages.length - 1;
      this.$nextTick(() => this.scrollChat());
      try {
        const resp = await fetch('/api/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, history })
        });
        await this.readStream(resp, (type, content) => {
          if (type === 'chunk') { this.messages[aiIdx].content += content; this.scrollChat(); }
        });
      } catch (e) {
        this.messages[aiIdx].content = '⚠️ 오류: ' + e.message;
      } finally {
        this.messages[aiIdx].streaming = false;
        this.chatLoading = false;
        this.scrollChat();
      }
    },

    scrollChat() {
      this.$nextTick(() => {
        const el = document.getElementById('chatMessages');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },

    // ── Research ──────────────────────────────────────────────
    async startResearch() {
      const q = this.researchQuery.trim();
      if (!q || this.researchLoading) return;
      this.researchLoading = true;
      this.researchResult = ''; this.researchStatus = ''; this.searchResults = [];
      try {
        const resp = await fetch('/api/research', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q })
        });
        await this.readStream(resp, (type, content) => {
          if (type === 'status')  { this.researchStatus = content; }
          else if (type === 'start') { this.researchStatus = ''; this.researchResult = content; }
          else if (type === 'chunk') { this.researchResult += content; }
          else if (type === 'error') { this.researchStatus = ''; this.researchResult = '⚠️ ' + content; }
        });
      } finally {
        this.researchLoading = false; this.researchStatus = '';
      }
    },

    async searchCompanies(q) {
      try {
        const r = await fetch('/api/search', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: q })
        });
        const d = await r.json();
        this.searchResults = d.results || [];
      } catch {}
    },

    quickResearch(code) {
      this.researchQuery = code;
      this.tab = 'research';
      this.$nextTick(() => this.startResearch());
    },

    // ── Portfolio CRUD ────────────────────────────────────────
    async addPosition() {
      const f = this.posForm;
      if (!f.code || !f.name || !f.quantity || !f.avg_price) {
        alert('종목코드·종목명·수량·평균단가는 필수입니다'); return;
      }
      try {
        const r = await fetch('/api/portfolio/add', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify(f)
        });
        const d = await r.json();
        if (d.ok) {
          this.showAddPosition = false;
          this.posForm = {code:'',name:'',quantity:null,avg_price:null,target_price:null,stop_price:null,timeframe:'short',sector:'',memo:''};
          await this.loadPortfolio();
        } else alert('추가 실패: ' + (d.error||'오류'));
      } catch(e) { alert('오류: ' + e.message); }
    },

    openSellModal(p) {
      this.sellModal = {show:true, code:p.code, name:p.name, qty:p.quantity, exit_price:p.current_price||null, partial_qty:null};
    },

    async closePosition() {
      const m = this.sellModal;
      if (!m.exit_price) { alert('매도가를 입력하세요'); return; }
      try {
        const r = await fetch('/api/portfolio/close', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({code:m.code, exit_price:m.exit_price, partial_qty:m.partial_qty||null})
        });
        const d = await r.json();
        if (d.ok) {
          this.sellModal.show = false;
          await this.loadPortfolio();
        } else alert('매도 실패: ' + (d.error||'오류'));
      } catch(e) { alert('오류: ' + e.message); }
    },

    openEditModal(p) {
      this.editModal = {show:true, code:p.code, name:p.name,
        target_price:p.target_price||null, stop_price:p.stop_price||null,
        timeframe:p.timeframe||'short', memo:p.memo||''};
    },

    async updatePosition() {
      const m = this.editModal;
      try {
        const r = await fetch('/api/portfolio/'+m.code, {
          method: 'PUT', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({target_price:m.target_price, stop_price:m.stop_price, timeframe:m.timeframe, memo:m.memo})
        });
        const d = await r.json();
        if (d.ok) {
          this.editModal.show = false;
          await this.loadPortfolio();
        } else alert('수정 실패: ' + (d.error||'오류'));
      } catch(e) { alert('오류: ' + e.message); }
    },

    // ── Portfolio ─────────────────────────────────────────────
    async loadPortfolio() {
      this.portfolioLoading = true;
      try {
        const [pr, br, sr] = await Promise.all([
          fetch('/api/portfolio').then(r => r.json()),
          fetch('/api/balance').then(r => r.json()),
          fetch('/api/portfolio/summary').then(r => r.json()),
        ]);
        this.portfolio = pr.positions || [];
        this.balance   = br.error ? null : br;
        this.portfolioSummary = sr.error ? null : sr;
        this.$nextTick(() => this.renderPortfolioCharts());
      } catch (e) {
        console.error(e);
      } finally {
        this.portfolioLoading = false;
      }
    },

    async loadHistory() {
      this.historyLoading = true;
      try {
        const r = await fetch('/api/portfolio/history');
        const d = await r.json();
        this.tradeHistory = d.trades || [];
      } finally {
        this.historyLoading = false;
      }
    },

    renderPortfolioCharts() {
      const summary = this.portfolioSummary;
      if (!summary?.sector_breakdown) return;

      const COLORS = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#06b6d4','#ef4444','#a3e635'];

      // 섹터 파이 차트
      const sctx = document.getElementById('sectorChart');
      if (sctx) {
        if (this._sectorChart) this._sectorChart.destroy();
        const sectors = Object.entries(summary.sector_breakdown);
        this._sectorChart = new Chart(sctx, {
          type: 'doughnut',
          data: {
            labels: sectors.map(([s]) => s),
            datasets: [{ data: sectors.map(([,v]) => v.weight_pct), backgroundColor: COLORS, borderWidth: 0 }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'right', labels: { color:'#94a3b8', font:{size:10}, boxWidth:10 } } }
          }
        });
      }

      // 전략 도넛 차트
      const tfctx = document.getElementById('tfChart');
      if (tfctx && summary.timeframe_breakdown) {
        if (this._tfChart) this._tfChart.destroy();
        const tf = summary.timeframe_breakdown;
        this._tfChart = new Chart(tfctx, {
          type: 'doughnut',
          data: {
            labels: ['단기', '중기', '장기'],
            datasets: [{ data: [tf.short||0, tf.mid||0, tf.long||0], backgroundColor: ['#3b82f6','#8b5cf6','#f59e0b'], borderWidth: 0 }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'right', labels: { color:'#94a3b8', font:{size:10}, boxWidth:10 } } }
          }
        });
      }
    },

    // ── Watchlist ─────────────────────────────────────────────
    async loadWatchlist() {
      this.watchlistLoading = true;
      try {
        const [wr, ar] = await Promise.all([
          fetch('/api/watchlist').then(r => r.json()),
          fetch('/api/alerts?days=14').then(r => r.json()),
        ]);
        this.watchlist       = wr.items || [];
        this.watchlistAlerts = ar.alerts || [];
      } finally {
        this.watchlistLoading = false;
      }
    },

    async addWatchlistItem() {
      if (!this.wlForm.code || !this.wlForm.name) {
        alert('종목코드와 종목명을 입력하세요');
        return;
      }
      try {
        const r = await fetch('/api/watchlist', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.wlForm)
        });
        const d = await r.json();
        if (d.ok) {
          this.showAddWatchlist = false;
          this.wlForm = { code:'', name:'', target_entry:null, timeframe:'short', reason:'' };
          await this.loadWatchlist();
        } else {
          alert('추가 실패: ' + (d.error || '알 수 없는 오류'));
        }
      } catch (e) {
        alert('오류: ' + e.message);
      }
    },

    async removeWatchlistItem(code) {
      if (!confirm(code + ' 을 관심종목에서 제거하시겠습니까?')) return;
      try {
        const r = await fetch('/api/watchlist/' + code, { method: 'DELETE' });
        const d = await r.json();
        if (d.ok) await this.loadWatchlist();
        else alert('제거 실패');
      } catch (e) {
        alert('오류: ' + e.message);
      }
    },

    // ── Briefings ─────────────────────────────────────────────
    async loadBriefings() {
      this.briefingsLoading = true;
      try {
        const r = await fetch('/api/briefings?limit=30');
        const d = await r.json();
        this.briefings = (d.briefings || []).map(b => ({ ...b, _open: false }));
      } finally {
        this.briefingsLoading = false;
      }
    },

    // ── Backtest ──────────────────────────────────────────────
    async loadBacktest() {
      this.btLoading = true; this.btStats = null; this.btItems = []; this.btChartData = [];
      try {
        const r = await fetch('/api/backtest?days=' + this.btDays);
        const d = await r.json();
        this.btStats = d.stats || null;
        this.btItems = d.items || [];
        this.btChartData = this.btItems.filter(i => i.return_pct != null);
        this.$nextTick(() => this.renderBtChart());
      } catch (e) {
        console.error(e);
      } finally {
        this.btLoading = false;
      }
    },

    renderBtChart() {
      const ctx = document.getElementById('btChart');
      if (!ctx || this.btChartData.length === 0) return;
      if (this._btChart) this._btChart.destroy();
      const sorted = [...this.btChartData].sort((a, b) => (b.return_pct||0) - (a.return_pct||0));
      this._btChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sorted.map(i => i.name||i.code),
          datasets: [{
            data: sorted.map(i => i.return_pct),
            backgroundColor: sorted.map(i => (i.return_pct||0) >= 0 ? '#22c55e' : '#ef4444'),
            borderRadius: 3, borderWidth: 0,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color:'#94a3b8', font:{size:9} }, grid: { color:'#1e293b' } },
            y: { ticks: { color:'#94a3b8', font:{size:9}, callback: v => v+'%' }, grid: { color:'#1e293b' } }
          }
        }
      });
    },

    async loadPerformance() {
      this.perfLoading = true; this.perfStats = null; this.perfTrades = [];
      try {
        const r = await fetch('/api/performance');
        const d = await r.json();
        this.perfStats  = d.stats || null;
        this.perfTrades = d.trades || [];
      } catch (e) {
        console.error(e);
      } finally {
        this.perfLoading = false;
      }
    },

    // ── SSE stream reader ─────────────────────────────────────
    async readStream(resp, onEvent) {
      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const ev = JSON.parse(line.slice(6));
              onEvent(ev.type, ev.content);
            } catch {}
          }
        }
      }
    }
  };
}
</script>
