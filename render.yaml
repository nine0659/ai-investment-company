services:
  - type: web
    name: ai-investment-company
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: bash start.sh
    # 무료 플랜: UptimeRobot으로 /health 5분마다 핑 → 슬립 방지
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_MODEL_CEO
        value: gpt-4o
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      # 텔레그램 투자채널 인텔리전스 수집용 (market_intelligence_team) — 누락 시
      # 채널 수집이 매번 조용히 빈 결과로 스킵된다. my.telegram.org에서 발급,
      # generate_telegram_session.py로 SESSION_STRING 생성 후 여기에 값 입력 필요.
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_STRING
        sync: false
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_ACCOUNT_NO
        sync: false
      - key: KIS_ACCOUNT_PROD_CD
        value: "01"
      - key: DART_API_KEY
        sync: false
      - key: WEB_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
