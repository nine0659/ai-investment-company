services:
  - type: worker
    name: ai-investment-company
    runtime: docker
    dockerfilePath: ./Dockerfile
    startCommand: bash start.sh
    # Worker 타입: HTTP 요청 없어도 슬립 없이 24시간 실행 (스케줄러 전용)
    # 웹 대시보드 복원이 필요하면 type: web으로 변경 + start.sh에 uvicorn 추가
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_MODEL_CEO
        value: gpt-4o
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_ACCOUNT_NO
        sync: false
      - key: KIS_ACCOUNT_PROD_CD
        value: "01"
      - key: DART_API_KEY
        sync: false
      - key: WEB_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
